<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .calculator { width: 200px; margin: 100px auto; }
        input[type='text'] { width: 100%; height: 40px; text-align: right; }
        button { width: 25%; height: 40px; font-size: 20px; }
        .operator { background-color: #f0ad4e; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" disabled />
        <br />
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="setOperation('/')">/</button>
        <br />
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="setOperation('*')">*</button>
        <br />
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="operator" onclick="setOperation('-')">-</button>
        <br />
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="calculateResult()">=</button>
        <button class="operator" onclick="setOperation('+')">+</button>
        <button onclick="clearDisplay()">C</button>
    </div>
    <script>
        let display = document.getElementById('display');
        let currentInput = ''; 
        let operation = null; 
        let operand1 = null; 

        function appendToDisplay(value) {
            currentInput += value;
            display.value = currentInput;
        }

        function setOperation(op) {
            if (currentInput === '') return;
            if (operand1 === null) {
                operand1 = parseFloat(currentInput);
            } else {
                calculateResult();
            }
            operation = op;
            currentInput = '';
        }

        function calculateResult() {
            if (operation === null || currentInput === '') return;
            let operand2 = parseFloat(currentInput);
            let result;
            switch (operation) {
                case '+':
                    result = operand1 + operand2;
                    break;
                case '-':
                    result = operand1 - operand2;
                    break;
                case '*':
                    result = operand1 * operand2;
                    break;
                case '/':
                    result = operand1 / operand2;
                    break;
            }
            display.value = result;
            currentInput = '';
            operation = null;
            operand1 = result;
        }

        function clearDisplay() {
            display.value = '';
            currentInput = '';
            operation = null;
            operand1 = null;
        }
    </script>
</body>
</html>
